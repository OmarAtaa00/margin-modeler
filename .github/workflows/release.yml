name: Build alpha desktop release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  validate-release:
    name: Validate alpha release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Verify tag and package versions
        shell: bash
        run: |
          set -euo pipefail

          tag_version="${GITHUB_REF_NAME#v}"
          package_version="$(node -p "require('./package.json').version")"
          cargo_version="$(awk -F ' *= *' '/^version = / { gsub(/"/, "", $2); print $2; exit }' src-tauri/Cargo.toml)"

          if [[ "$tag_version" != "$package_version" ]]; then
            echo "Tag version ($tag_version) does not match package.json ($package_version)." >&2
            exit 1
          fi

          if [[ "$cargo_version" != "$package_version" ]]; then
            echo "Cargo.toml version ($cargo_version) does not match package.json ($package_version)." >&2
            exit 1
          fi

          if [[ "$package_version" != *-alpha.* ]]; then
            echo "This workflow is reserved for alpha versions such as 0.2.0-alpha.1." >&2
            exit 1
          fi

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Audit production npm dependencies
        run: npm audit --omit=dev --audit-level=high

  publish-tauri:
    name: Build ${{ matrix.name }}
    needs: validate-release
    runs-on: ${{ matrix.platform }}
    timeout-minutes: 60
    permissions:
      contents: write
      id-token: write
      attestations: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Apple Silicon
            platform: macos-latest
            args: "--target aarch64-apple-darwin --bundles dmg"
            rustTargets: "aarch64-apple-darwin,x86_64-apple-darwin"
            artifactGlob: "src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg"
            checksumFile: "SHA256SUMS-macos-aarch64.txt"
            workflowArtifact: "margin-modeler-macos-aarch64"
          - name: macOS Intel
            platform: macos-latest
            args: "--target x86_64-apple-darwin --bundles dmg"
            rustTargets: "aarch64-apple-darwin,x86_64-apple-darwin"
            artifactGlob: "src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg"
            checksumFile: "SHA256SUMS-macos-x86_64.txt"
            workflowArtifact: "margin-modeler-macos-x86_64"
          - name: Windows x64
            platform: windows-latest
            args: "--bundles nsis"
            rustTargets: ""
            artifactGlob: "src-tauri/target/release/bundle/nsis/*.exe"
            checksumFile: "SHA256SUMS-windows-x64.txt"
            workflowArtifact: "margin-modeler-windows-x64"

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rustTargets }}

      - name: Cache Rust builds
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm ci

      - name: Build installers and update the draft prerelease
        id: tauri
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Margin Modeler ${{ github.ref_name }} — Alpha
          releaseBody: |
            ## Alpha release

            This is prerelease software intended for testing and evaluation. Keep independent backups of important workspace exports.

            ### Downloads
            - Windows x64: NSIS file ending in `setup.exe`
            - Apple Silicon Mac: DMG containing `aarch64`
            - Intel Mac: DMG containing `x86_64`

            ### Signing status
            - Windows Authenticode: **not configured for this release**
            - macOS: **ad-hoc signed, not Developer ID signed or notarized**

            Do not disable Microsoft Defender, CrowdStrike, or another endpoint-security product to install the application.

            Platform-specific SHA-256 files are attached. Public-repository builds also receive GitHub build-provenance attestations.
          generateReleaseNotes: true
          releaseDraft: true
          prerelease: true
          retryAttempts: 2
          uploadUpdaterJson: false
          uploadWorkflowArtifacts: true
          workflowArtifactNamePattern: ${{ matrix.workflowArtifact }}
          args: ${{ matrix.args }}

      - name: Generate macOS SHA-256 checksums
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p checksums
          files=( ${{ matrix.artifactGlob }} )
          if (( ${#files[@]} == 0 )); then
            echo "No release artifacts found." >&2
            exit 1
          fi
          shasum -a 256 "${files[@]}" > "checksums/${{ matrix.checksumFile }}"

      - name: Generate Windows SHA-256 checksums
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path checksums | Out-Null
          $files = Get-ChildItem -Path "src-tauri/target/release/bundle/nsis" -Filter "*.exe" -File
          if (-not $files) {
            throw "No Windows NSIS installer was generated."
          }
          $lines = foreach ($file in $files) {
            $hash = (Get-FileHash $file.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
            "$hash  $($file.Name)"
          }
          $lines | Set-Content -Encoding utf8 "checksums/${{ matrix.checksumFile }}"

      - name: Upload checksum to the draft release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "$GITHUB_REF_NAME" "checksums/${{ matrix.checksumFile }}" --clobber

      - name: Attest release artifacts
        if: github.event.repository.private == false
        uses: actions/attest@v4
        with:
          subject-path: ${{ matrix.artifactGlob }}

      - name: Upload installers and checksums as workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.workflowArtifact }}-verified
          if-no-files-found: error
          path: |
            ${{ matrix.artifactGlob }}
            checksums/${{ matrix.checksumFile }}
